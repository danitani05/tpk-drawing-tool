  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#8494a3;margin-bottom:8px\">Alur kerja<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:8px;font-size:12.5px;color:#3d4d5c;line-height:1.5\">\n              <div style=\"display:flex;gap:9px\"><b style=\"color:#0d63a5;flex-shrink:0\">1.<\u002Fb><span>Pilih <b>Layer<\u002Fb> aktif (ikon lapisan di kiri bawah)<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;gap:9px\"><b style=\"color:#0d63a5;flex-shrink:0\">2.<\u002Fb><span>Pilih tool: Bebas, Dermaga, CY, Alat, atau Gate<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;gap:9px\"><b style=\"color:#0d63a5;flex-shrink:0\">3.<\u002Fb><span>Isi parameter \u2192 <b>Tempatkan<\u002Fb> \u2192 klik lokasi di peta<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;gap:9px\"><b style=\"color:#0d63a5;flex-shrink:0\">4.<\u002Fb><span>Klik objek untuk edit \u00b7 <b>Esc<\u002Fb> membatalkan mode<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:12px;color:#8494a3;line-height:1.7;margin-bottom:14px\">Semua perubahan <b style=\"color:#5a6b7a\">tersimpan otomatis<\u002Fb> per terminal. Gunakan menu <b style=\"color:#5a6b7a\">File<\u002Fb> untuk pindah antar komputer.<\u002Fdiv>\n          <button data-action=\"undo\" style=\"width:100%;height:36px;border:1px solid #d7dee5;border-radius:8px;background:#fff;color:#5a6b7a;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer\">Undo \u2014 hapus objek terakhir<\u002Fbutton>\n        <\u002Fdiv>\n\n        <!-- PANEL: FREE -->\n        <div id=\"pnl-free\" style=\"display:none\">\n          <div style=\"font-size:12.5px;color:#8494a3;line-height:1.6;margin-bottom:14px\">Gambar bentuk bebas pada layer aktif. Klik titik demi titik, double-klik untuk selesai.<\u002Fdiv>\n          <button data-action=\"free-poly\" style=\"width:100%;height:40px;border:none;border-radius:8px;background:#0d63a5;color:#fff;font-size:13.5px;font-weight:700;font-family:inherit;cursor:pointer;margin-bottom:8px\">Gambar Polygon<\u002Fbutton>\n          <button data-action=\"free-rect\" style=\"width:100%;height:40px;border:1px solid #bcd4e8;border-radius:8px;background:#eef5fb;color:#0d63a5;font-size:13.5px;font-weight:700;font-family:inherit;cursor:pointer;margin-bottom:8px\">Gambar Rectangle<\u002Fbutton>\n          <button data-action=\"free-del\" style=\"width:100%;height:36px;border:1px solid #f0d4cf;border-radius:8px;background:#fdf3f1;color:#c2402f;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;margin-bottom:8px\">Hapus Objek (klik di peta)<\u002Fbutton>\n          <button data-action=\"undo\" style=\"width:100%;height:36px;border:1px solid #d7dee5;border-radius:8px;background:#fff;color:#5a6b7a;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer\">Undo<\u002Fbutton>\n        <\u002Fdiv>\n\n        <!-- PANEL: DERMAGA -->\n        <div id=\"pnl-dermaga\" style=\"display:none\">\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px\">\n            <div>\n              <label style=\"display:block;font-size:12px;font-weight:600;color:#5a6b7a;margin-bottom:5px\">Panjang (m)<\u002Flabel>\n              <input type=\"number\" id=\"dp\" min=\"1\" placeholder=\"350\" style=\"width:100%;height:34px;padding:0 10px;border:1px solid #d7dee5;border-radius:7px;font-size:13.5px;font-family:'IBM Plex Mono',monospace;color:#1a2733;background:#fff;box-sizing:border-box;outline:none\">\n            <\u002Fdiv>\n            <div>\n              <label style=\"display:block;font-size:12px;font-weight:600;color:#5a6b7a;margin-bottom:5px\">Lebar (m)<\u002Flabel>\n              <input type=\"number\" id=\"dl\" min=\"1\" placeholder=\"30\" style=\"width:100%;height:34px;padding:0 10px;border:1px solid #d7dee5;border-radius:7px;font-size:13.5px;font-family:'IBM Plex Mono',monospace;color:#1a2733;background:#fff;box-sizing:border-box;outline:none\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:1fr 1.4fr;gap:10px;margin-bottom:12px\">\n            <div>\n              <label style=\"display:block;font-size:12px;font-weight:600;color:#5a6b7a;margin-bottom:5px\">Jumlah lane<\u002Flabel>\n              <input type=\"number\" id=\"dn\" min=\"1\" style=\"width:100%;height:34px;padding:0 10px;border:1px solid #d7dee5;border-radius:7px;font-size:13.5px;font-family:'IBM Plex Mono',monospace;color:#1a2733;background:#fff;box-sizing:border-box;outline:none\">\n            <\u002Fdiv>\n            <div>\n              <label style=\"display:block;font-size:12px;font-weight:600;color:#5a6b7a;margin-bottom:5px\">Orientasi<\u002Flabel>\n              <div style=\"display:flex;background:#f2f5f8;border-radius:7px;padding:3px;height:34px;box-sizing:border-box\">\n                <div id=\"doH\" data-action=\"ori\" data-arg=\"d,H\" style=\"flex:1;display:flex;align-items:center;justify-content:center;border-radius:5px;font-size:12px;cursor:pointer\">Horizontal<\u002Fdiv>\n                <div id=\"doV\" data-action=\"ori\" data-arg=\"d,V\" style=\"flex:1;display:flex;align-items:center;justify-content:center;border-radius:5px;font-size:12px;cursor:pointer\">Vertikal<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#f6f8fa;border-radius:8px;padding:10px 12px;margin-bottom:12px\">\n            <div style=\"display:flex;justify-content:space-between;font-size:13px;line-height:2\"><span style=\"color:#5a6b7a\">Panjang<\u002Fspan><span id=\"dcp\" style=\"font-family:'IBM Plex Mono',monospace;font-weight:600\">\u2014<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;justify-content:space-between;font-size:13px;line-height:2\"><span style=\"color:#5a6b7a\">Lebar<\u002Fspan><span id=\"dcl\" style=\"font-family:'IBM Plex Mono',monospace;font-weight:600\">\u2014<\u0 lay:block;font-size:12px;font-weight:600;color:#5a6b7a;margin-bottom:5px\">Row per blok<\u002Flabel>\n              <input type=\"number\" id=\"cyr\" min=\"1\" placeholder=\"6\" style=\"width:100%;height:34px;padding:0 10px;border:1px solid #d7dee5;border-radius:7px;font-size:13.5px;font-family:'IBM Plex Mono',monospace;color:#1a2733;background:#fff;box-sizing:border-box;outline:none\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:1fr 1.4fr;gap:10px;margin-bottom:12px\">\n            <div>\n              <label style=\"display:block;font-size:12px;font-weight:600;color:#5a6b7a;margin-bottom:5px\">Jumlah blok<\u002Flabel>\n              <input type=\"number\" id=\"cyb\" min=\"1\" style=\"width:100%;height:34px;padding:0 10px;border:1px solid #d7dee5;border-radius:7px;font-size:13.5px;font-family:'IBM Plex Mono',monospace;color:#1a2733;background:#fff;box-sizing:border-box;outline:none\">\n            <\u002Fdiv>\n            <div>\n              <label style=\"display:block;font-size:12px;font-weight:600;color:#5a6b7a;margin-bottom:5px\">Orientasi<\u002Flabel>\n              <div style=\"display:flex;background:#f2f5f8;border-radius:7px;padding:3px;height:34px;box-sizing:border-box\">\n                <div id=\"coH\" data-action=\"ori\" data-arg=\"cy,H\" style=\"flex:1;display:flex;align-items:center;justify-content:center;border-radius:5px;font-size:12px;cursor:pointer\">Horizontal<\u002Fdiv>\n                <div id=\"coV\" data-action=\"ori\" data-arg=\"cy,V\" style=\"flex:1;display:flex;align-items:center;justify-content:center;border-radius:5px;font-size:12px;cursor:pointer\">Vertikal<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#f6f8fa;border-radius:8px;padding:10px 12px;margin-bottom:12px\">\n            <div style=\"display:flex;justify-content:space-between;font-size:13px;line-height:2\"><span style=\"color:#5a6b7a\">Panjang 1 blok<\u002Fspan><span id=\"ccp\" style=\"font-family:'IBM Plex Mono',monospace;font-weight:600\">\u2014<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;justify-content:space-between;font-size:13px;line-height:2\"><span style=\"color:#5a6b7a\">Lebar 1 blok<\u002Fspan><span id=\"ccl\" style=\"font-family:'IBM Plex Mono',monospace;font-weight:600\">\u2014<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;justify-content:space-between;font-size:13px;line-height:2\"><span style=\"color:#5a6b7a\">Luas 1 blok<\u002Fspan><span id=\"cca1\" style=\"font-family:'IBM Plex Mono',monospace;font-weight:600\">\u2014<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;justify-content:space-between;font-size:13px;line-height:2;border-top:1px solid #e2e8ee;margin-top:4px;padding-top:4px\"><span style=\"color:#5a6b7a;font-weight:600\">Total luas CY<\u002Fspan><span id=\"ccat\" style=\"font-family:'IBM Plex Mono',monospace;font-weight:700;color:#0d63a5\">\u2014<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <button data-action=\"place-cy\" style=\"width:100%;height:40px;border:none;border-radius:8px;background:#0d63a5;color:#fff;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px\">\n            <svg width=\"15\" height=\"15\" sc-camel-view-box=\"0 0 16 16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" style=\"pointer-events:none\"><path d=\"M8 14s5-4.4 5-8a5 5 0 0 0-10 0c0 3.6 5 8 5 8z\"><\u002Fpath><circle cx=\"8\" cy=\"6\" r=\"1.8\"><\u002Fcircle><\u002Fsvg>\n            Tempatkan CY di peta<\u002Fbutton>\n          <button data-action=\"undo\" style=\"width:100%;height:34px;margin-top:8px;border:1px solid #d7dee5;border-radius:8px;background:#fff;color:#5a6b7a;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer\">Undo<\u002Fbutton>\n        <\u002Fdiv>\n\n        <!-- PANEL: EQUIP -->\n        <div id=\"pnl-equip\" style=\"display:none\">\n          <div style=\"font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#8494a3;margin-bottom:8px\">Shore crane<\u002Fdiv>\n          <div id=\"sc-types\" style=\"display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px\">\n            <div data-action=\"eqtype\" data-arg=\"sc,QCC\" data-col=\"#c0392b\" style=\"padding:5px 12px;border-radius:999px;border:1px solid #d7dee5;background:#fff;color:#5a6b7a;font-size:12px;font-weight:600;cursor:pointer\">QCC<\u002Fdiv>\n            <div data-action=\"eqtype\" data-arg=\"sc,HMC\" data-col=\"#e67e22\" style=\"padding:5px 12px;border-radius:999px;border:1px solid #d7dee5;background:#fff;color:#5a6b7a;font-size:12px;font-weight:600;cursor:pointer\">HMC<\u002Fdiv>\n            <div data-action=\"eqtype\" data-arg=\"sc,FIXED\" data-col=\"#5d6d7e\" style=\"padding:5px 12px;border-radius:999px;border:1px solid #d7dee5;background:#fff;color:#5a6b7a;font-size:12px;font-weight:600;cursor:pointer\">FC<\u002Fdiv>\n            <div data-action=\"eqtype\" data-arg=\"sc,MOBILE\" data-col=\"#b7950b\" style=\"padding:5px 12px;border-radius:999px;border:1px solid #d7dee5;background:#fff;color:#5a6b7a;font-size:12px;font-weight:600;cursor:pointer\">MC<\u002Fdiv>\n          <\u002Fdiv>\n          <div id=\"sc-preview\" style=\"text-align:center;margin-bottom:9px;padding:8px;background:linear-gradient(180deg,#dfe9f1 0%,#eef4f9 72%,#c3cdd6 72%,#b4bfc9 100%);border:1px solid #e2e8ee;border-radius:8px;min-height:52px;display:flex;align-items:center;justify-content:center\"><\u002Fdiv>\n          <div style=\"display:flex;gap:10px;align-items:flex-end;margin-bottom:16px\">\n            <div style=\"flex:1\">\n              <label style=\"display:block;font-size:12px;font-weight:600;color:#5a6b7a;margin-bottom:5px\">Jumlah unit<\u002Flabel>\n              <input type=\"number\" id=\"sc-cnt\" min=\"1\" style=\"width:100%;height:34px;padding:0 10px;border:1px solid #d7dee5;border-radius:7px;font-size:13.5px;font-family:'IBM Plex Mono',monospace;color:#1a2733;background:#fff;box-sizing:border-box;outline:none\">\n            <\u002Fdiv>\n            <button data-action=\"place-sc\" style=\"flex:1.3;height:34px;border:none;border-radius:7px;background:#0d63a5;color:#fff;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer\">Tempatkan SC<\u002Fbutton>\n          <\u002Fdiv>\n\n          <div style=\"font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#8494a3;margin-bottom:8px;border-top:1px solid #eef2f5;padding-top:14px\">Yard equipment<\u002Fdiv>\n          <div id=\"yc-types\" style=\"display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px\">\n            <div data-action=\"eqtype\" data-arg=\"yc,RTG\" data-col=\"#2471a3\" style=\"padding:5px 12px;border-radius:999px;border:1px solid #d7dee5;background:#fff;color:#5a6b7a;font-size:12px;font-weight:600;cursor:pointer\">RTG<\u002Fdiv>\n            <div data-action=\"eqtype\" data-arg=\"yc,RS\" data-col=\"#1e8449\" style=\"padding:5px 12px;border-radius:999px;border:1px solid #d7dee5;background:#fff;color:#5a6b7a;font-size:12px;font-weight:600;cursor:pointer\">Reach Stacker<\u002Fdiv>\n            <div data-action=\"eqtype\" data-arg=\"yc,SL\" data-col=\"#117a65\" style=\"padding:5px 12px;border-radius:999px;border:1px solid #d7dee5;background:#fff;color:#5a6b7a;font-size:12px;font-weight:600;cursor:pointer\">Side Loader<\u002Fdiv>\n            <div data-action=\"eqtype\" data-arg=\"yc,FL\" data-col=\"#7f8c8d\" style=\"padding:5px 12px;border-radius:999px;border:1px solid #d7dee5;background:#fff;color:#5a6b7a;font-size:12px;font-weight:600;cursor:pointer\">Forklift<\u002Fdiv>\n          <\u002Fdiv>\n          <div id=\"yc-preview\" style=\"text-align:center;margin-bottom:9px;padding:8px;background:linear-gradient(180deg,#dfe9f1 0%,#eef4f9 72%,#c3cdd6 72%,#b4bfc9 100%);border:1px solid #e2e8ee;border-radius:8px;min-height:52px;display:flex;align-items:center;justify-content:center\"><\u002Fdiv>\n          <div style=\"display:flex;gap:10px;align-items:flex-end;margin-bottom:16px\">\n            <div style=\"flex:1\">\n              <label style=\"display:block;font-size:12px;font-weight:600;color:#5a6b7a;margin-bottom:5px\">Jumlah unit<\u002Flabel>\n              <input type=\"number\" id=\"yc-cnt\" min=\"1\" style=\"width:100%;height:34px;padding:0 10px;border:1px solid #d7dee5;border-radius:7px;font-size:13.5px;font-family:'IBM Plex Mono',monospace;color:#1a2733;background:#fff;box-sizing:border-box;outline:none\">\n            <\u002Fdiv>\n            <button data-action=\"place-yc\" style=\"flex:1.3;height:34px;border:none;border-radius:7px;background:#0d63a5;color:#fff;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer\">Tempatkan YC<\u002Fbutton>\n          <\u002Fdiv>\n\n          <div style=\"font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#8494a3;margin-bottom:8px;border-top:1px solid #eef2f5;padding-top:14px\">Head truck<\u002Fdiv>\n          <div style=\"display:flex;gap:10px;align-items:flex-end;margin-bottom:16px\">\n            <div style=\"flex:1\">\n              <label style=\"display:block;font-size:12px;font-weight:600;color:#5a6b7a;margin-bottom:5px\">Jumlah unit<\u002Flabel>\n              <input type=\"number\" id=\"ht-cnt\" min=\"1\" style=\"width:100%;height:34px;padding:0 10px;border:1px solid #d7dee5;border-radius:7px;font-size:13.5px;font-family:'IBM Plex Mono',monospace;color:#1a2733;background:#fff;box-sizing:border-box;outline:none\">\n            <\u002Fdiv>\n            <button data-action=\"place-ht\" style=\"flex:1.3;height:34px;border:none;border-radius:7px;background:#0d63a5;color:#fff;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer\">Tempatkan HT<\u002Fbutton>\n          <\u002Fdiv>\n          <button data-action=\"undo\" style=\"width:100%;height:34px;border:1px solid #d7dee5;border-radius:8px;background:#fff;color:#5a6b7a;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer\">Undo<\u002Fbutton>\n        <\u002Fdiv>\n\n        <!-- PANEL: GATE -->\n        <div id=\"pnl-gate\" style=\"display:none\">\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px\">\n            <div>\n              <label style=\"display:block;font-size:12px;font-weight:600;color:#5a6b7a;margin-bottom:5px\">Jumlah lane<\u002Flabel>\n              <input type=\"number\" id=\"gl-cnt\" min=\"1\" style=\"width:100%;height:34px;padding:0 10px;border:1px solid #d7dee5;border-radius:7px;font-size:13.5px;font-family:'IBM Plex Mono',monospace;color:#1a2733;background:#fff;box-sizing:border-box;outline:none\">\n            <\u002Fdiv>\n            <div>\n              <label style=\"display:block;font-size:12px;font-weight:600;color:#5a6b7a;margin-bottom:5px\">Lebar / lane (m)<\u002Flabel>\n              <input type=\"number\" id=\"gl-lw\" min=\"2\" max=\"8\" step=\"0.1\" style=\"width:100%;height:34px;padding:0 10px;border:1px solid #d7dee5;border-radius:7px;font-size:13.5px;font-family:'IBM Plex Mono',monospace;color:#1a2733;background:#fff;box-sizing:border-box;outline:none\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:1fr 1.4fr;gap:10px;margin-bottom:12px\">\n            <div>\n              <label style=\"display:block;font-size:12px;font-weight:600;color:#5a6b7a;margin-bottom:5px\">Kedalaman (m)<\u002Flabel>\n              <input type=\"number\" id=\"gl-dep\" min=\"5\" max=\"60\" style=\"width:100%;height:34px;padding:0 10px;border:1px solid #d7dee5;border-radius:7px;font-size:13.5px;font-family:'IBM Plex Mono',monospace;color:#1a2733;background:#fff;box-sizing:border-box;outline:none\">\n            <\u002Fdiv>\n            <div>\n              <label style=\"display:block;font-size:12px;font-weight:600;color:#5a6b7a;margin-bottom:5px\">Orientasi<\u002Flabel>\n              <div style=\"d 002Fbutton>\n              <button id=\"op-tr\" data-action=\"ovl-pos\" data-arg=\"topright\" style=\"height:30px;border:1px solid #d7dee5;border-radius:6px;background:#fff;color:#5a6b7a;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer\">Kanan atas<\u002Fbutton>\n              <button id=\"op-bl\" data-action=\"ovl-pos\" data-arg=\"bottomleft\" style=\"height:30px;border:1px solid #d7dee5;border-radius:6px;background:#fff;color:#5a6b7a;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer\">Kiri bawah<\u002Fbutton>\n              <button id=\"op-br\" data-action=\"ovl-pos\" data-arg=\"bottomright\" style=\"height:30px;border:1px solid #d7dee5;border-radius:6px;background:#fff;color:#5a6b7a;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer\">Kanan bawah<\u002Fbutton>\n            <\u002Fdiv>\n            <button id=\"op-drag\" data-action=\"ovl-pos\" data-arg=\"drag\" style=\"width:100%;height:30px;border:1px solid #d7dee5;border-radius:6px;background:#fff;color:#5a6b7a;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;margin-bottom:10px\">Bebas \u2014 seret handle \u283f<\u002Fbutton>\n            <div style=\"display:flex;align-items:center;gap:9px\">\n              <span style=\"font-size:12px;color:#8494a3;flex-shrink:0\">Transparansi<\u002Fspan>\n              <input type=\"range\" id=\"ovl-opacity\" min=\"20\" max=\"100\" step=\"2\" style=\"flex:1;accent-color:#0d63a5;cursor:pointer\">\n              <span id=\"ovl-opacity-val\" style=\"font-size:12px;font-weight:600;font-family:'IBM Plex Mono',monospace;min-width:36px;text-align:right\">96%<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- PANEL: PROJECT -->\n        <div id=\"pnl-project\" style=\"display:none\">\n          <label style=\"display:block;font-size:12px;font-weight:600;color:#5a6b7a;margin-bottom:5px\">Nama terminal (ketik lalu Enter)<\u002Flabel>\n          <input type=\"text\" id=\"term-name\" style=\"width:100%;height:36px;padding:0 11px;border:1px solid #d7dee5;border-radius:7px;font-size:13.5px;font-weight:600;color:#1a2733;background:#fff;box-sizing:border-box;outline:none;margin-bottom:12px;font-family:inherit\">\n          <label style=\"display:block;font-size:12px;font-weight:600;color:#5a6b7a;margin-bottom:5px\">Buka project tersimpan<\u002Flabel>\n          <sc-raw-select id=\"term-sel\" style=\"width:100%;height:36px;padding:0 8px;border:1px solid #d7dee5;border-radius:7px;font-size:13.5px;color:#1a2733;background:#fff;box-sizing:border-box;outline:none;margin-bottom:12px;font-family:inherit;cursor:pointer\"><\u002Fsc-raw-select>\n          <button data-action=\"new-terminal\" style=\"width:100%;height:38px;border:1px solid #bcd4e8;border-radius:8px;background:#eef5fb;color:#0d63a5;font-size:13.5px;font-weight:700;font-family:inherit;cursor:pointer\">+ Terminal baru (kanvas kosong)<\u002Fbutton>\n          <div style=\"font-size:12px;color:#8494a3;line-height:1.7;margin-top:12px\">Posisi &amp; zoom peta ikut tersimpan otomatis per terminal. Gunakan menu <b style=\"color:#5a6b7a\">File<\u002Fb> untuk export/import antar komputer.<\u002Fdiv>\n          <div id=\"link-status\" style=\"font-size:12px;color:#0d63a5;font-weight:600;line-height:1.6;margin-top:10px;word-break:break-all\">Belum tertaut ke berkas<\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- MAP -->\n    <div id=\"map-wrap\" style=\"position:relative;flex:1;min-width:0;overflow:hidden\">\n      <div id=\"tpk-map\" style=\"position:absolute;inset:0;z-index:0\"><\u002Fdiv>\n\n      <!-- ROTATION PILL -->\n      <div style=\"position:absolute;top:12px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:11px;background:rgba(255,255,255,.97);border:1px solid #d7dee5;border-radius:999px;padding:7px 16px;box-shadow:0 3px 12px rgba(16,34,51,.16);z-index:900\" title=\"Rotasi terkunci saat zoom/pan\">\n        <span id=\"cicon\" style=\"display:inline-flex;transition:transform .1s\">\n          <svg width=\"17\" height=\"17\" sc-camel-view-box=\"0 0 16 16\" fill=\"none\" stroke=\"#5a6b7a\" stroke-width=\"1.4\"><circle cx=\"8\" cy=\"8\" r=\"6.4\"><\u002Fcircle><path d=\"M8 3.4l1.7 5.6-1.7-1.3-1.7 1.3z\" fill=\"#c2402f\" stroke=\"#c2402f\"><\u002Fpath><\u002Fsvg>\n        <\u002Fspan>\n        <span style=\"font-size:12px;font-weight:600;color:#5a6b7a\">Rotasi<\u002Fspan>\n        <input type=\"range\" id=\"rslider\" min=\"0\" max=\"360\" step=\"1\" style=\"width:150px;accent-color:#0d63a5;cursor:pointer\">\n        <input type=\"number\" id=\"rnum\" min=\"0\" max=\"360\" step=\"1\" style=\"width:52px;height:26px;padding:0 6px;border:1px solid #d7dee5;border-radius:6px;font-size:12.5px;font-weight:600;font-family:'IBM Plex Mono',monospace;color:#1a2733;background:#fff;box-sizing:border-box;outline:none;text-align:center\">\n        <span style=\"font-size:12px;color:#8494a3\">\u00b0<\u002Fspan>\n        <span style=\"width:1px;height:16px;background:#e2e8ee\"><\u002Fspan>\n        <span data-action=\"north\" style=\"font-size:12px;font-weight:700;color:#0d63a5;cursor:pointer\">Utara<\u002Fspan>\n      <\u002Fdiv>\n\n      <!-- FLOATING EDIT CARD -->\n      <div id=\"edit-card\" style=\"display:none;position:absolute;top:64px;right:14px;width:262px;max-height:calc(100% - 110px);overflow-y:auto;background:rgba(255,255,255,.98);border:1px solid #d7dee5;border-radius:11px;box-shadow:0 8px 28px rgba(16,34,51,.22);padding:14px 16px;z-index:950\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:2px\">\n          <div style=\"font-size:13.5px;font-weight:700\">Edit objek<\u002Fdiv>\n          <span data-action=\"done-edit\" title=\"Selesai edit\" style=\"display:inline-flex;padding:4px;cursor:pointer\">\n            <svg width=\"14\" height=\"14\" sc-camel-view-box=\"0 0 16 16\" fill=\"none\" stroke=\"#8494a3\" stroke-width=\"1.8\" stroke-linecap=\"round\" style=\"pointer-events:none\"><path d=\"M3.5 3.5l9 9M12.5 3.5l-9 9\"><\u002Fpath><\u002Fsvg>\n          <\u002Fspan>\n        <\u002Fdiv>\n        <div id=\"einfo\" style=\"font-size:12.5px;color:#5a6b7a;margin-bottom:2px\">\u2014<\u002Fdiv>\n        <div id=\"ebadge\" style=\"font-size:11.5px;font-weight:600;margin-bottom:11px\">\u2014<\u002Fdiv>\n\n        <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:12px\">\n          <span style=\"font-size:12px;font-weight:600;color:#5a6b7a;flex-shrink:0\">Bearing<\u002Fspan>\n          <input type=\"range\" id=\"ebrg\" min=\"0\" max=\"360\" step=\"1\" style=\"flex:1;accent-color:#d98e04;cursor:pointer\">\n          <input type=\"number\" id=\"ebrgn\" min=\"0\" max=\"360\" step=\"0.5\" style=\"width:52px;height:26px;padding:0 6px;border:1px solid #d7dee5;border-radius:6px;font-size:12px;font-weight:600;font-family:'IBM Plex Mono',monospace;color:#b47607;background:#fff;box-sizing:border-box;outline:none;text-align:center\">\n        <\u002Fdiv>\n\n        <div id=\"e-drm\" style=\"display:none;margin-bottom:12px\">\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:8px\">\n            <div>\n              <label style=\"display:block;font-size:11px;font-weight:600;color:#8494a3;margin-bottom:3px\">Panjang (m)<\u002Flabel>\n              <input type=\"number\" id=\"edp\" min=\"1\" style=\"width:100%;height:30px;padding:0 8px;border:1px solid #d7dee5;border-radius:6px;font-size:13px;font-family:'IBM Plex Mono',monospace;box-sizing:border-box;outline:none\">\n            <\u002Fdiv>\n            <div>\n              <label style=\"display:block;font-size:11px;font-weight:600;color:#8494a3;margin-bottom:3px\">Lebar (m)<\u002Flabel>\n              <input type=\"number\" id=\"edl\" min=\"1\" style=\"width:100%;height:30px;padding:0 8px;border:1px solid #d7dee5;border-radius:6px;font-size:13px;font-family:'IBM Plex Mono',monospace;box-sizing:border-box;outline:none\">\n            <\u002Fdiv>\n            <div>\n              <label style=\"display:block;font-size:11px;font-weight:600;color:#8494a3;margin-bottom:3px\">Lane<\u002Flabel>\n              <input type=\"number\" id=\"edn\" min=\"1\" style=\"width:100%;height:30px;padding:0 8px;border:1px solid #d7dee5;border-radius:6px;font-size:13px;font-family:'IBM Plex Mono',monospace;box-sizing:border-box;outline:none\">\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;justify-content:flex-end\">\n              <div style=\"font-size:11px;font-weight:600;color:#8494a3;margin-bottom:3px\">Luas<\u002Fdiv>\n              <div id=\"edluas\" style=\"height:30px;display:flex;align-items:center;font-size:13px;font-weight:700;font-family:'IBM Plex Mono',monospace;color:#0d63a5\">\u2014<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div id=\"e-cy\" style=\"display:none;margin-bottom:12px\">\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px\">\n            <div>\n              <label style=\"display:block;font-size:11px;font-weight:600;color:#8494a3;margin-bottom:3px\">Slot<\u002Flabel>\n              <input type=\"number\" id=\"ecs\" min=\"1\" style=\"width:100%;height:30px;padding:0 8px;border:1px solid #d7dee5;border-radius:6px;font-size:13px;font-family:'IBM Plex Mono',monospace;box-sizing:border-box;outline:none\">\n            <\u002Fdiv>\n            <div>\n              <label style=\"display:block;font-size:11px;font-weight:600;color:#8494a3;margin-bottom:3px\">Row<\u002Flabel>\n              <input type=\"number\" id=\"ecr\" min=\"1\" style=\"width:100%;height:30px;padding:0 8px;border:1px solid #d7dee5;border-radius:6px;font-size:13px;font-family:'IBM Plex Mono',monospace;box-sizing:border-box;outline:none\">\n            <\u002Fdiv>\n            <div>\n              <label style=\"display:block;font-size:11px;font-weight:600;color:#8494a3;margin-bottom:3px\">Blok<\u002Flabel>\n              <input type=\"number\" id=\"ecb\" min=\"1\" style=\"width:100%;height:30px;padding:0 8px;border:1px solid #d7dee5;border-radius:6px;font-size:13px;font-family:'IBM Plex Mono',monospace;box-sizing:border-box;outline:none\">\n            <\u002Fdiv>\n            <div>\n              <label style=\"display:block;font-size:11px;font-weight:600;color:#8494a3;margin-bottom:3px\">Jarak blok (m)<\u002Flabel>\n              <input type=\"number\" id=\"ecg\" min=\"0\" step=\"0.5\" style=\"width:100%;height:30px;padding:0 8px;border:1px solid #d7dee5;border-radius:6px;font-size:13px;font-family:'IBM Plex Mono',monospace;box-sizing:border-box;outline:none\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#f6f8fa;border-radius:7px;padding:8px 10px\">\n            <div style=\"display:flex;justify-content:space-between;font-size:12px;line-height:1.9\"><span style=\"color:#8494a3\">Panjang blok<\u002Fspan><span id=\"eccp\" style=\"font-family:'IBM Plex Mono',monospace;font-weight:600\">\u2014<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;justify-content:space-between;font-size:12px;line-height:1.9\"><span style=\"color:#8494a3\">Lebar blok<\u002Fspan><span id=\"eccl\" style=\"font-family:'IBM Plex Mono',monospace;font-weight:600\">\u2014<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;justify-content:space-between;font-size:12px;line-height:1.9\"><span style=\"color:#8494a3\">Total luas<\u002Fspan><span id=\"ecct\" style=\"font-family:'IBM Plex Mono',monospace;font-weight:700;color:#0d63a5\">\u2014<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div id=\"e-equip\" style=\"display:none;margin-bottom:12px\">\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:8px\">\n            <div>\n              <label style=\"display:block;font-size:11px;font-weight:600;color:#8494a3;margin-bottom:3px\">Jenis<\u002Flabel>\n              <input type=\"text\" id=\"eeqtype\" readonly=\"\" style=\"width:100%;height:30px;padding:0 8px;border:1px solid #eef2f5;border-radius:6px;font-size:12.5px;font-weight:600;color:#b47607;background:#f8fafc;box-sizing:border-box;outline:none;cursor:default;font-family:inherit\">\n            <\u002Fdiv>\n            <div>\n              <label style=\"display:block;font-size:11px;font-weight:600;color:#8494a3;margin-bottom:3px\">Jumlah unit<\u002Flabel>\n              <input type=\"number\" id=\"eeqcnt\" min=\"1\" style=\"width:100%;height:30px;padding:0 8px;border:1px solid #d7dee5;border-radius:6px;font-size:13px;font-family:'IBM Plex Mono',monospace;box-sizing:border-box;outline:none\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"margin-top:10px\">\n            <label style=\"display:block;font-size:11px;font-weight:600;color:#8494a3;margin-bottom:3px\">Warna alat<\u002Flabel>\n            <div style=\"display:flex;align-items:center;gap:8px\">\n              <input type=\"color\" id=\"e-eq-color\" value=\"#c0392b\" style=\"width:46px;height:30px;padding:2px;border:1px solid #d7dee5;border-radius:6px;background:#fff;cursor:pointer;box-sizing:border-box\">\n              <button type=\"button\" id=\"e-eq-color-reset\" style=\"height:30px;padding:0 10px;border:1px solid #d7dee5;border-radius:6px;background:#f8fafc;color:#5a6b7a;font-size:11.5px;font-weight:600;font-family:inherit;cursor:pointer\">Reset<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"font-size:11.5px;color:#8494a3;background:#f8fafc;border-radius:6px;padding:7px 10px;margin-bottom:11px;line-height:1.6\">Seret handle <b style=\"color:#0d63a5\">\u2725<\u002Fb> di peta untuk memindahkan objek.<\u002Fdiv>\n        <div style=\"display:flex;gap:8px\">\n          <button data-action=\"delete-selected\" style=\"flex:1;height:32px;border:1px solid #f0d4cf;border-radius:7px;background:#fdf3f1;color:#c2402f;font-size:12.5px;font-weight:600;font-family:inherit;cursor:pointer\">Hapus<\u002Fbutton>\n          <button data-action=\"done-edit\" style=\"flex:1.4;height:32px;border:none;border-radius:7px;background:#0d63a5;color:#fff;font-size:12.5px;font-weight:700;font-family:inherit;cursor:pointer\">Selesai<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- \u2550\u2550\u2550 STATUS BAR \u2550\u2550\u2550 -->\n  <div style=\"height:30px;flex-shrink:0;background:#fff;border-top:1px solid #e2e8ee;display:flex;align-items:center;gap:22px;padding:0 18px;font-size:12px;color:#5a6b7a;z-index:1100;position:relative\">\n    <span id=\"sll\" style=\"font-family:'IBM Plex Mono',monospace\">\u2014<\u002Fspan>\n    <span>Zoom <b id=\"sz\" style=\"color:#1a2733\">17<\u002Fb><\u002Fspan>\n    <span>Bearing <b id=\"sbrg\" style=\"color:#1a2733\">0\u00b0<\u002Fb><\u002Fspan>\n    <span id=\"shint\" style=\"color:#a5b1bd\">Klik objek untuk edit \u00b7 Esc membatalkan mode<\u002Fspan>\n    <span id=\"ssave\" style=\"margin-left:auto;color:#237a4c;font-weight:600\"><\u002Fspan>\n  <\u002Fdiv>\n\n  <!-- \u2550\u2550\u2550 EXPORT MODAL \u2550\u2550\u2550 -->\n  <div id=\"exp-modal\" style=\"display:none;position:fixed;inset:0;background:rgba(16,34,51,.45);z-index:9500;align-items:center;justify-content:center\">\n    <div style=\"background:#fff;border-radius:12px;padding:22px;width:340px;box-shadow:0 16px 48px rgba(16,34,51,.3)\">\n      <div id=\"exp-modal-title\" style=\"font-size:15px;font-weight:700;margin-bottom:12px\">Pilih layer untuk ekspor<\u002Fdiv>\n      <div id=\"exp-layer-checks\"><\u002Fdiv>\n      <div style=\"font-size:12px;color:#8494a3;margin-top:10px;line-height:1.6\">Layer yang tidak dicentang akan disembunyikan saat ekspor.<\u002Fdiv>\n      <div style=\"display:flex;gap:8px;margin-top:16px\">\n        <button data-action=\"exp-cancel\" style=\"flex:1;height:36px;border:1px solid #d7dee5;border-radius:8px;background:#fff;color:#5a6b7a;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer\">Batal<\u002Fbutton>\n        <button id=\"exp-do-btn\" data-action=\"exp-do\" style=\"flex:1.4;height:36px;border:none;border-radius:8px;background:#0d63a5;color:#fff;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer\">Export<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- TOAST -->\n  <div id=\"toast\" style=\"position:fixed;bottom:44px;left:50%;transform:translateX(-50%);background:#1f7a43;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:opacity .3s;z-index:9999;box-shadow:0 4px 16px rgba(16,34,51,.25)\"><\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    const tryInit = () => {\n      const ready = window.L && window.L.Draw && window.L.Map && window.L.Map.prototype.setBearing && document.getElementById('tpk-map');\n      if (ready) {\n        import(window.__resources.tpkApp).then(m => m.initApp()).catch(err => console.error('Gagal memuat logika aplikasi:', err));\n      } else {\n        setTimeout(tryInit, 120);\n      }\n    };\n    tryInit();\n  }\n  renderVals() {\n    return {};\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
